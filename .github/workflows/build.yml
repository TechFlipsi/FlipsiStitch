name: Build FlipsiStitch

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
          $ffmpegExe = Get-ChildItem -Path ffmpeg_temp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeExe = Get-ChildItem -Path ffmpeg_temp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination .
          Copy-Item $ffprobeExe.FullName -Destination .

      - name: Build Full .exe (with ffmpeg)
        shell: pwsh
        run: |
          $version = Get-Content VERSION
          pyinstaller --onefile --windowed --name flipsisitch --icon icon.ico --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-data "VERSION;." pyinstaller_flipsisitch.spec
          if ($LASTEXITCODE -ne 0) {
            pyinstaller --onefile --windowed --name flipsisitch --icon icon.ico --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-data "VERSION;." flipsisitch.py
          }

      - name: Build Lite .exe (without ffmpeg)
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name flipsisitch-lite --icon icon.ico --add-data "VERSION;." flipsisitch.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiStitch-${{ steps.version.outputs.VERSION }}
          path: |
            dist/flipsisitch.exe
            dist/flipsisitch-lite.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: FlipsiStitch-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flipsisitch.exe
            flipsisitch-lite.exe
          generate_release_notes: true